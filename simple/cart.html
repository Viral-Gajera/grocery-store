    <div class="container mt-4" id="cartItems">
        <div class="row">
            <div class="col-12">
                <h2>Summary</h2>
                <table class="table table-bordered">
                    <thead>
                        <tr class="">
                            <th>Product</th>
                            <th>Price (₹)</th>
                            <th>Quantity</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="cartTableBody"></tbody>
                </table>
                <h5 class="mt-4 mb-4">
                    Total: ₹<span id="totalAmount">0</span>
                </h5>
                <button class="btn btn-dark" id="checkOutButton" onclick="checkout()">
                    Checkout
                </button>
            </div>
        </div>
    </div>

    <script>
        const checkOutButton = document.querySelector("#checkOutButton");
        const cartItems = document.querySelector("#cartItems");
        const emptyMessage = document.querySelector("#emptyMessage");

        function logout() {
            localStorage.removeItem("currentUser");
            window.location.href = "login.html";
        }

        // Display Cart Items
        // function displayCart() {
        //     let cart = JSON.parse(localStorage.getItem("cart")) || [];
        //     let cartTableBody = document.getElementById("cartTableBody");
        //     let total = 0;

        //     cartTableBody.innerHTML = "";
        //     cart.forEach((item, index) => {
        //         total += item.price;
        //         cartTableBody.innerHTML += `
        //             <tr>
        //                 <td>${item.name}</td>
        //                 <td>₹${item.price}</td>
        //                 <td>${item.quantity ?? 1}</td>
        //                 <td><button class="btn btn-danger btn-sm" onclick="removeFromCart(${index})">Remove</button></td>
        //             </tr>`;
        //     });

        //     document.getElementById("totalAmount").innerText = total;
        // }
        function displayCart() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let cartTableBody = document.getElementById("cartTableBody");
            // let cartSignleTableBody = document.getElementById(
            //     "cartSignleTableBody"
            // );

            let total = 0;
            let cartSummary = {};

            if (cart.length === 0) {
                checkOutButton.disabled = true;
                cartItems.style.display = "none";
                emptyMessage.style.display = "flex";
            } else {
                checkOutButton.disabled = false;
                cartItems.style.display = "block";
                emptyMessage.style.display = "none";
            }

            // Count product quantities
            cart.forEach((item) => {
                if (cartSummary[item.id]) {
                    cartSummary[item.id].quantity += 1;
                } else {
                    cartSummary[item.id] = { ...item, quantity: 1 };
                }
            });

            cartTableBody.innerHTML = "";
            Object.values(cartSummary).forEach((item, index) => {
                total += item.price * item.quantity;
                cartTableBody.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td>₹${item.price}</td>
                        <td>
                            <button class="btn btn-sm btn-secondary" onclick="updateQuantity('${item.id}', -1)">
                                <div style="width:17px;"><b>-</b><div>
                            </button>
                            <div style="width:20px; display:inline-block; text-align:center;">${item.quantity}</div>
                            <button class="btn btn-sm btn-secondary" onclick="updateQuantity('${item.id}', 1)">
                                <div style="width:17px;"><b>+</b><div>
                            </button>
                        </td>
                        <td><button class="btn btn-danger btn-sm" onclick="removeFromCart('${item.id}')">Remove</button></td>
                    </tr>`;
            });

            // cartSignleTableBody.innerHTML = "";
            // Object.values(cartSummary).forEach((item, index) => {
            //     cartSignleTableBody.innerHTML += `
            //         <tr>
            //             <td>${item.name}</td>
            //             <td>
            //                 <div style="height:31px" >₹${item.price}</div>
            //             </td>
            //         </tr>`;
            // });

            document.getElementById("totalAmount").innerText = total;
            updateCartCount();
        }

        function updateQuantity(productId, change) {

            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let index = cart.findIndex((item) => item.id == productId);

            if (index !== -1) {
                if (change === -1) {
                    cart.splice(index, 1);
                } else {
                    cart.push(cart[index]);
                }
            }

            localStorage.setItem("cart", JSON.stringify(cart));
            displayCart();
        }

        // Remove Item from Cart
        function removeFromCart(id) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart = cart.filter((item)=>item.id != id)
            localStorage.setItem("cart", JSON.stringify(cart));
            displayCart();
            updateCartCount();
        }

        // Update Cart Count
        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            document.getElementById("cartCount").innerText = cart.length;
        }

        // Checkout Function
        function checkout() {
            // if (confirm("Proceed to checkout?")) {
            //     alert("Order Placed Successfully!");
            //     localStorage.removeItem("cart");
            //     displayCart();
            //     updateCartCount();
            // }
            if (confirm("Proceed to checkout?")) {
                window.location.href = "trasaction.html";
            }
        }
    </script>
