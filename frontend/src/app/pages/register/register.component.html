<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
  <div class="card p-4 mt-5" *ngIf="!registered" style="width: 100%; max-width: 400px;">
    <h2 class="text-center">Register</h2>
    <form (ngSubmit)="register()">
      <div class="mb-3">
        <label class="form-label">Name:</label>
        <input type="text" class="form-control" [(ngModel)]="user.name" name="name" required maxlength="50">
      </div>
      <div class="mb-3">
        <label class="form-label">Email:</label>
        <input type="email" class="form-control" [(ngModel)]="user.email" name="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password:</label>
        <input type="password" class="form-control" [(ngModel)]="user.password" name="password" required maxlength="30">
      </div>
      <div class="mb-3">
        <label class="form-label">Address:</label>
        <textarea class="form-control" [(ngModel)]="user.address" name="address" required maxlength="100"></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Contact:</label>
        <input type="text" class="form-control" [(ngModel)]="user.contact" name="contact" required maxlength="10">
      </div>
      <button type="submit" class="btn btn-dark w-100">Register</button>
    </form>
    <p class="text-center mt-3">Existing User? <a routerLink="/login">Login Here</a></p>
  </div>

  <div class="card p-5 text-center" *ngIf="registered">
    <h3>Customer Registration Successful!</h3>
    <table class="detail-table">
      <tr>
        <td><strong>Name :</strong></td>
        <td>{{ user.name }}</td>
      </tr>
      <tr>
        <td><strong>Email :</strong></td>
        <td>{{ user.email }}</td>
      </tr>
    </table>
    <button class="btn btn-dark mt-3" (click)="goToLogin()">Go to Login</button>
  </div>
</div>
