<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <link rel="stylesheet" href="./bootstrap-5.3.3-dist/css/bootstrap.min.css">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" style="position: absolute; top: 0px; width: 100%;">
        <div class="container">
            <a class="navbar-brand" href="index.html">Grocery Store</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                class="bi bi-arrow-right-short" viewBox="0 0 16 16">
                                <path fill-rule="evenodd"
                                    d="M4 8a.5.5 0 0 1 .5-.5h5.793L8.146 5.354a.5.5 0 1 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L10.293 8.5H4.5A.5.5 0 0 1 4 8" />
                            </svg>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="card p-4 mt-5" id="registrationForm" style="width: 100%; max-width: 400px;">
        <h2 class="text-center">Register</h2>
        <form onsubmit="register(event)">
            <div class="mb-3">
                <label class="form-label">Name:</label>
                <input type="text" id="name" class="form-control" required maxlength="50">
            </div>
            <div class="mb-3">
                <label class="form-label">Email:</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password:</label>
                <input type="password" id="password" class="form-control" required maxlength="30">
            </div>
            <div class="mb-3">
                <label class="form-label">Address:</label>
                <textarea id="address" class="form-control" required maxlength="100"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Contact:</label>
                <input type="text" id="contact" class="form-control" required maxlength="10">
            </div>
            <button type="submit" class="btn btn-dark w-100">Register</button>
        </form>
        <p class="text-center mt-3">Existing User? <a href="login.html">Login Here</a></p>
    </div>

    <!-- Success Message (Initially Hidden) -->
    <div class="card p-4 text-center" id="successMessage" style="display: none;">
        <h3>Customer Registration Successful!</h3>
        <p><strong>Customer ID:</strong> <span id="generatedCustomerId"></span></p>
        <p><strong>Name:</strong> <span id="registeredName"></span></p>
        <p><strong>Email:</strong> <span id="registeredEmail"></span></p>
        <a href="login.html" class="btn btn-dark">Go to Login</a>
    </div>

    <script>
        function register(event) {
            event.preventDefault();

            let name = document.getElementById("name").value.trim();
            let email = document.getElementById("email").value.trim();
            let password = document.getElementById("password").value;
            let address = document.getElementById("address").value.trim();
            let contact = document.getElementById("contact").value.trim();

            // Validations
            if (! /^[A-z\s]+$/.test(name)) {
                alert("Customer Name must have alphabets only.");
                return;
            }
            if(name.length > 50 ){
                alert("Customer Name must be less then 50 characters.");
                return;
            }
            if (!/^[A-z][[A-z0-9.]+[@][A-z0-9.]+/.test(email)) {
                alert("Email ID not valid.");
                return;
            }
            if (! /[A-z0-9!@#$%^&*]{5,30}/.test(password)) {
                alert("Password length must be between 5 to 30 characters.");
                return;
            }
            if (!/^\d{10}$/.test(contact)) {
                alert("Contact number must be 10 digits.");
                return;
            }
            if (!/^[6789]/.test(contact)) {
                alert("Contact number must starts with 6 / 7 / 8 / 9. ");
                return;
            }

            let customerId = "CUST" + Math.floor(Math.random() * 10000);

            let user = { customerId, name, email, password, address, contact };
            let users = JSON.parse(localStorage.getItem("users")) || [];
            users.push(user);
            localStorage.setItem("users", JSON.stringify(users));

            // Hide Registration Form and Show Success Message
            document.getElementById("registrationForm").style.display = "none";
            document.getElementById("successMessage").style.display = "block";
            document.getElementById("generatedCustomerId").innerText = customerId;
            document.getElementById("registeredName").innerText = name;
            document.getElementById("registeredEmail").innerText = email;
        }
    </script>
</body>

</html>
