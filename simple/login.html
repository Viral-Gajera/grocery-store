<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <link rel="stylesheet" href="./bootstrap-5.3.3-dist/css/bootstrap.min.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

        <!-- Navigation Bar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark" style="position: absolute; top: 0px; width: 100%;">
            <div class="container">
                <a class="navbar-brand" href="index.html">Grocery Store</a>
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                    class="bi bi-arrow-right-short" viewBox="0 0 16 16">
                                    <path fill-rule="evenodd"
                                        d="M4 8a.5.5 0 0 1 .5-.5h5.793L8.146 5.354a.5.5 0 1 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L10.293 8.5H4.5A.5.5 0 0 1 4 8" />
                                </svg>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

    <div class="card p-4" style="width: 100%; max-width: 400px;">
        <h2 class="text-center">Login</h2>
        <form onsubmit="login(event)">
            <div class="mb-3">
                <label class="form-label">Customer ID:</label>
                <input type="text" id="customerId" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password:</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Login</button>
        </form>
        <p class="text-center mt-3">New User? <a href="register.html">Register Here</a></p>
    </div>

    <script>
        function login(event) {
            event.preventDefault();

            let customerId = document.getElementById("customerId").value.trim();
            let password = document.getElementById("password").value.trim();
            let users = JSON.parse(localStorage.getItem("users")) || [];
            let user = users.find(u => u.customerId === customerId);

            if (!user) {
                alert("ID not valid");
                return;
            }
            if (user.password !== password) {
                alert("Password not valid");
                return;
            }

            localStorage.setItem("currentUser", JSON.stringify(user));
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
