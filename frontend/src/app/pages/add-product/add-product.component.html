<div class="container mt-4" style="min-height: 100vh;">
    <h2 class="mb-3">{{ action == 'add' ? 'Add' : 'Update' }} Product</h2>
    <form (ngSubmit)="productAction()">
        <div class="mb-3">
            <label class="form-label">Product Name:</label>
            <input type="text" class="form-control" [(ngModel)]="product.name" name="name" required maxlength="50">
        </div>
        <div class="mb-3">
            <label class="form-label">Price:</label>
            <input type="number" class="form-control" [(ngModel)]="product.price" name="price" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Image Url:</label>
            <input type="text" class="form-control" [(ngModel)]="product.image" name="image">
        </div>
        <div class="mb-3">
            <label class="form-label">Description:</label>
            <textarea class="form-control" [(ngModel)]="product.description" name="description" required
                maxlength="1000"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Category:</label>
            <select name="category" class="form-select" [(ngModel)]="product.category" required>
                <option *ngFor="let category of categories" [value]="category.name">{{category.name}}</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Quantity:</label>
            <input type="number" class="form-control" [(ngModel)]="product.quantity" name="quantity" required>
        </div>
        <button type="submit" class="btn btn-dark">{{ action == 'add' ? 'Add' : 'Update' }} Product</button>
    </form>
</div>
