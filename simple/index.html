<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <link rel="stylesheet" href="./bootstrap-5.3.3-dist/css/bootstrap.min.css">
    <style>
        .hero-bg {
            background: url("./images/grocery.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center center;
            height: calc(70vh - 50px);
        }

        .hero-overlay {
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);

            display: flex;
            align-items: center;
            justify-content: center;


            & .container {
                text-align: center;
            }
        }

        #welcomeMessage {
            color: white;
            /* display: inline; */
        }

        .footer {
            height: 100px;
        }

        .loader-container {
            display: flex;
            justify-content: center;
            align-items: center;

            margin: 100px auto;

        }

        .loader {
            width: 60px;
            height: 60px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #212529;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .card-hover {
            transition: all 300ms;
        }

        .card-hover:hover {
            transform: scale(1.05);
        }

        .search-title {
            display: flex;
            justify-content: space-between;

            & .search-input-container {
                width: 300px;
                height: 40px;
            }
        }
    </style>
</head>

<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Grocery Store</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html" style="color: white;">Home</a></li>
                    <li class="nav-item" id="myProfileLink" ><a class="nav-link" href="profile.html">My Profile</a></li>
                    <li class="nav-item" id="cartLink" >
                        <a class="nav-link" href="cart.html">
                            Cart <span id="cartCount" class="badge bg-danger">0</span>
                        </a>
                    </li>
                    <li class="nav-item" id="logoutLink" ><a class="nav-link" href="#" onclick="logout()" >Logout</a></li>
                    <li class="nav-item" id="loginLink" ><a class="nav-link" href="login.html" >Login</a></li>
                    <li class="nav-item" id="registerLink" ><a class="nav-link" href="register.html" >Register</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Welcome Message -->
    <div class="hero-bg">
        <div class="hero-overlay">
            <div class="container">
                <h1 id="welcomeMessage"></h1>
                <button class="btn btn-light mt-2" style="font-weight: 600;"
                    onclick="window.location.href='#groceries-list'">
                    Explore Grocery Items
                </button>

            </div>
        </div>
    </div>


    <!-- loader -->
    <div class="loader-container" id="loderContainer">
        <div class="loader"></div>
    </div>


    <!-- Grocery Items List -->
    <div class="container mt-5">
        <div class="search-title">
            <h3 class="mb-4" id="groceries-list">Available Groceries</h3>
            <div class="input-group mb-3 search-input-container">
                <span class="input-group-text" id="basic-addon1"><i class="fas fa-search"></i></span>
                <input type="text" class="form-control" placeholder="Search" aria-describedby="basic-addon1"
                    id="searchString" oninput="displayProducts()">
            </div>
        </div>
        <div id="productList" class="row"></div>
    </div>

    <!-- footer -->
    <div class="footer bg-dark mt-5">
    </div>

    <script>

        let user = localStorage.getItem("currentUser");

        let loderContainer = document.getElementById("loderContainer");
        let myProfileLink = document.getElementById("myProfileLink");
        let cartLink = document.getElementById("cartLink");
        let logoutLink = document.getElementById("logoutLink");
        let loginLink = document.getElementById("loginLink");
        let registerLink = document.getElementById("registerLink");
        

        const capitalizeFirstLetter = (str) => {
            if (!str) return str;
            const [first, ...rest] = str;
            return first.toUpperCase() + rest.join('');
        };

        function checkLogin() {
            user = localStorage.getItem("currentUser");
            if (!user) {
                // window.location.href = "login.html";
                document.getElementById("welcomeMessage").innerText = `Welcome to Grocery Store!`;

                myProfileLink.style.display = "none";
                cartLink.style.display = "none";
                logoutLink.style.display = "none";
                loginLink.style.display = "inline";
                registerLink.style.display = "inline";

            } else {
                document.getElementById("welcomeMessage").innerText = `Hello, ${capitalizeFirstLetter(JSON.parse(user).name)}, \n Welcome to Grocery Store`;

                myProfileLink.style.display = "inline";
                cartLink.style.display = "inline";
                logoutLink.style.display = "inline";
                loginLink.style.display = "none";
                registerLink.style.display = "none";
            }
        }

        function logout() {
            localStorage.removeItem("currentUser");
            // window.location.href = "login.html";
            checkLogin();
        }

        // Sample Product List
        const products = [
            { id: 1, name: "Apples", price: 50, image: "./images/apple.jpg" },
            { id: 2, name: "Bananas", price: 30, image: "./images/banana.jpg" },
            { id: 3, name: "Milk", price: 60, image: "./images/milk.jpg" },
            { id: 4, name: "Bread", price: 40, image: "./images/bread.jpg" },
            { id: 5, name: "Meggi", price: 10, image: "./images/meggi.jpg" },
            { id: 6, name: "Tomato", price: 110, image: "./images/tomato.jpg" },
            { id: 7, name: "Yogurt", price: 150, image: "./images/yogaurt.jpg" },
            { id: 8, name: "Spinach", price: 200, image: "./images/spinach.jpg" }
        ];

        // Display Products on Home Page
        function displayProducts() {

            loderContainer.style.display = "flex";

            let productList = document.getElementById("productList");
            let searchString = document.getElementById("searchString");

            let count = 0;
            productList.innerHTML = ""
            products.forEach(product => {
                if (product.name.toLowerCase().includes(searchString.value.toLowerCase())) {
                    count ++ ;
                    productList.innerHTML += `
                    <div class="col-md-3 card-hover" >
                        <div class="card mb-3">
                            <div  style="object-fit:center; height:150px; overflow:hidden; background-image:url(${product.image}); background-size:cover; background-position:center center; border-top-left-radius: 0.375rem; border-top-right-radius: 0.375rem;" >
                            </div>
                            <div class="card-body">
                                <h5 class="card-title">${product.name}</h5>
                                <p class="card-text">Price: ₹${product.price}</p>
                                <button class="btn btn-dark addToCartButton" onclick="addToCart(${product.id})">Add to Cart</button>
                            </div>
                        </div>
                    </div>
                    `;
                }
            });

            if(!count){
                productList.innerHTML = `<div style="height:200px; display:flex; justify-content: center; align-items:center;" >
                        <h4>No Products Found</h4>
                    </div>`;
            }

            loderContainer.style.display = "none";
        }

        // Add Product to Cart
        function addToCart(productId) {

            if(!user){
                alert("Please Login, to add item to Cart")
                let wantsToLogin = confirm("Do you want to login now?");
                if(wantsToLogin){
                    window.location.href = "login.html"
                }
                return;
            }

            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let product = products.find(p => p.id === productId);
            cart.push(product);
            localStorage.setItem("cart", JSON.stringify(cart));
            updateCartCount();
            alert(`${product.name} added to cart!`);
        }

        // Update Cart Count in Navbar
        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            document.getElementById("cartCount").innerText = cart.length;
        }

        checkLogin();
        displayProducts();
        updateCartCount();
    </script>

</body>

</html>
