<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <link rel="stylesheet" href="./bootstrap-5.3.3-dist/css/bootstrap.min.css">
</head>

<body onload="loadProfile()">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Grocery Store</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="profile.html" style="color: white" >My Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">
                            Cart
                            <span id="cartCount" class="badge bg-danger">0</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>My Profile</h2>
        <form id="profileForm">
            <div class="mb-3">
                <label class="form-label">Customer ID:</label>
                <input type="text" id="customerId" class="form-control" disabled>
            </div>
            <div class="mb-3">
                <label class="form-label">Name:</label>
                <input type="text" id="name" class="form-control" disabled>
            </div>
            <div class="mb-3">
                <label class="form-label">Email:</label>
                <input type="email" id="email" class="form-control" disabled>
            </div>
            <div class="mb-3">
                <label class="form-label">Address:</label>
                <textarea id="address" class="form-control" disabled></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Contact Number:</label>
                <input type="text" id="contact" class="form-control" disabled>
            </div>
            <button type="button" id="editBtn" class="btn btn-dark" onclick="enableEditing()">Edit</button>
            <button type="button" id="saveBtn" class="btn btn-dark" onclick="saveProfile()"
                style="display: none;">Save</button>
        </form>
    </div>
    <script>
        function loadProfile() {
            let user = JSON.parse(localStorage.getItem("currentUser"));
            if (!user) {
                window.location.href = "login.html";
            } else {
                document.getElementById("customerId").value = user.customerId;
                document.getElementById("name").value = user.name;
                document.getElementById("email").value = user.email;
                document.getElementById("address").value = user.address;
                document.getElementById("contact").value = user.contact;
            } updateCartCount();
        }
        function enableEditing() {
            document.getElementById("name").disabled = false;
            document.getElementById("address").disabled = false;
            document.getElementById("contact").disabled = false;
            document.getElementById("editBtn").style.display = "none";
            document.getElementById("saveBtn").style.display = "inline-block";
        }
        function saveProfile() {
            let user = JSON.parse(localStorage.getItem("currentUser"));
            user.name = document.getElementById("name").value.trim();
            user.address = document.getElementById("address").value.trim();
            user.contact = document.getElementById("contact").value.trim();
            if (!/^[A-Za-z\s]+$/.test(user.name)) {
                alert("Customer Name must have alphabets only.");
                return;
            }
            if(user.name.length > 50 ){
                alert("Customer Name must be less then 50 characters.");
                return;
            }
            if (!/^\d{10}$/.test(user.contact)) {
                alert("Contact number must be 10 digits.");
                return;
            }
            if (!/^[6789]/.test(user.contact)) {
                alert("Contact number must starts with 6 / 7 / 8 / 9. ");
                return;
            }


            let users = JSON.parse(localStorage.getItem("users")) || [];
            let index = users.findIndex(u => u.customerId === user.customerId);
            if (index !== -1)
                users[index] = user;

            localStorage.setItem("users", JSON.stringify(users));
            localStorage.setItem("currentUser", JSON.stringify(user));
            alert("Profile Updated Successfully!");
            document.getElementById("name").disabled = true;
            document.getElementById("address").disabled = true;
            document.getElementById("contact").disabled = true;
            document.getElementById("editBtn").style.display = "inline-block";
            document.getElementById("saveBtn").style.display = "none";
        }
        function logout() {
            localStorage.removeItem("currentUser");
            window.location.href = "login.html";
        }
        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            document.getElementById("cartCount").innerText = cart.length;
        }
    </script>
</body>

</html>
