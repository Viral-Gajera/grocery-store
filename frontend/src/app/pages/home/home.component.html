<div class="hero-bg">
    <div class="hero-overlay">
        <div class="container">
            <h1 id="welcomeMessage" class="text-white">
                <span>
                    {{
                        currentUser
                            ? "Hello, " +
                              capitalizeFirstLetter(currentUser.name)
                            : ""
                    }}
                </span>
                <span *ngIf="currentUser">
                    <br />
                </span>
                <span> Welcome to Grocery Store! </span>
            </h1>
            <button
                class="btn btn-light mt-2"
                style="font-weight: 600"
                (click)="scrollToGroceries()"
            >
                Explore Grocery Items
            </button>
        </div>
    </div>
</div>

<div class="loader-container" *ngIf="loading">
    <div class="loader"></div>
</div>

<div class="container mt-5" *ngIf="!loading">
    <div class="search-title">
        <h3 class="mb-4" id="groceries-list">Available Groceries</h3>
        <div class="input-group mb-3 search-input-container">
            <span class="input-group-text"><i class="fas fa-search"></i></span>
            <input
                type="text"
                class="form-control"
                placeholder="Search"
                [(ngModel)]="searchString"
                (input)="onSearch()"
            />
        </div>
    </div>
    <div class="row" *ngIf="filteredProducts.length > 0; else noProducts">
        <div
            class="col-md-3 card-hover"
            *ngFor="let product of filteredProducts"
        >
            <div class="card mb-3">
                <div
                    style="height: 150px; 
                    overflow: hidden; 
                    background-image: url({{product.image}}); 
                    background-size: cover; 
                    background-position: center; 
                    border-top-left-radius: 0.375rem; 
                    border-top-right-radius: 0.375rem;"
                ></div>
                <div class="card-body">
                    <h5 class="card-title">{{ product.name }}</h5>
                    <p class="card-text" style="margin-bottom: 0px">
                        Price: ₹{{ product.price }}
                    </p>
                    <p class="card-text" style="margin-bottom: 0px">
                        <span *ngIf="product.quantity" class="text-success">
                            <span class="status-dot-success" ></span>
                            <strong>In Stock ({{ product.quantity }}) </strong>
                        </span>
                        <span *ngIf="!product.quantity" class="text-danger">
                            <span class="status-dot-danger"></span>
                            <strong>Out of Stock</strong>
                        </span>
                    </p>
                    <button
                        class="btn btn-dark mt-3"
                        (click)="addToCart(product)"
                        *ngIf="currentUser?.role != 'admin'"
                        [disabled]="!product.quantity"
                    >
                        Add to Cart
                    </button>
                    <button
                        class="btn btn-dark mt-3"
                        (click)="updateProduct(product)"
                        *ngIf="currentUser?.role == 'admin'"
                    >
                        Update
                    </button>
                    <button
                        class="btn btn-dark mx-2 mt-3"
                        (click)="deleteProduct(product)"
                        *ngIf="currentUser?.role == 'admin'"
                    >
                        Delete
                    </button>
                </div>
            </div>
        </div>
    </div>
    <ng-template #noProducts>
        <div
            style="
                height: 200px;
                display: flex;
                justify-content: center;
                align-items: center;
            "
        >
            <h4>No Products Found</h4>
        </div>
    </ng-template>
</div>

<div class="footer bg-dark mt-5"></div>
